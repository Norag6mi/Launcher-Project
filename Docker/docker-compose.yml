services:

  backend:
    build:
      context: ../Backend

    ports:
      - "8000:8000"

    depends_on:
      mysql:
        condition: service_healthy

    volumes:
      - ../Backend:/app


  mysql:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: anomaly
      MYSQL_DATABASE: game_launcher

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-panomaly"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  mysql_data: